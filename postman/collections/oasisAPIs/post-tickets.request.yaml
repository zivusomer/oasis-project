$kind: http-request
name: POST /tickets
method: POST
url: '{{baseURL}}/tickets'
headers:
  - key: Content-Type
    value: application/json
    enabled: true
  - key: Authorization
    value: 'Bearer {{authToken}}'
    enabled: true
body:
  mode: raw
  raw: |-
    {
      "projectKey": "SEC",
      "title": "Sample finding",
      "description": "Sample finding description"
    }
